<script>
function mk(id, crop, rest){
  var data=JSON.parse(document.getElementById(id+'-data').textContent);
  document.getElementById('dim-'+id).textContent = data.w+'×'+data.h+'  ·  ip'+data.ip+'–op'+data.op+'  ·  '+data.fr+'fps';
  var cont=document.getElementById(id+'-ico');
  var anim=lottie.loadAnimation({container:cont,renderer:'svg',loop:false,autoplay:false,animationData:data});
  anim.addEventListener('DOMLoaded',function(){
    var svg=cont.querySelector('svg');
    svg.setAttribute('viewBox',crop);
    svg.setAttribute('preserveAspectRatio','xMidYMid meet');
    anim.goToAndStop(rest-anim.firstFrame,true);
  });
  return anim;
}

// FOLLOWING — toggle, starts followed (ip0–op145). New keyframes:

var fA=mk('follow','8 8 50 50',74), followed=true;

  if(followed){ fA.playSegments([106,122],true); followed=false; }   // active → not active

});

fb.addEventListener('mouseleave',function(){ followed ? fA.goToAndStop(74-fA.firstFrame,true) : fA.playSegments([125,130],true); });

// LIKE — toggle, starts deselected (ip0–op169)
