<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reply arrow — your AE animation on the O2 button</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
  :root{
    --o2-text:#50575e; --o2-border:#dcdcde; --o2-border-hov:#c3c4c7;
    --o2-bg:#fff; --o2-bg-hov:#f6f7f7; --o2-badge:#757575;
    --o2-font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:48px 32px;font-family:var(--o2-font);color:var(--o2-text);background:#f0f0f1}
  .wrap{max-width:680px;margin:0 auto}
  h1{font-size:15px;color:#1e1e1e;margin:0 0 4px}
  p.sub{font-size:13px;color:#6b7177;margin:0 0 26px;line-height:1.5}
  .card{background:#fff;border:1px solid var(--o2-border);border-radius:8px;padding:24px;margin-bottom:20px}
  .card .lbl{font-size:12px;color:#787c80;margin-bottom:14px}
  .row{display:flex;align-items:center;gap:18px}

  /* big looping preview of your raw comp */
  #bigPreview{width:240px;height:104px;border:1px dashed #e3e3e4;border-radius:6px}

  .o2-btn{
    display:inline-flex;align-items:center;gap:6px;
    padding:7px 13px;font-size:14px;line-height:1;color:var(--o2-text);
    background:var(--o2-bg);border:1px solid var(--o2-border);border-radius:6px;
    cursor:pointer;user-select:none;transition:background .15s,border-color .15s;
  }
  .o2-btn:hover{background:var(--o2-bg-hov);border-color:var(--o2-border-hov)}
  .o2-count{font-size:12px;color:var(--o2-badge)}

  /* the icon slot: crop the wide comp to a window over the arrow.
     Visible arrow lives at comp point (71, 58.7) per the AE mask rect.
     Scale S=0.36, box 26x20, offset so (71,58.7)*S lands at box center (13,10). */
  .ico-lottie{width:26px;height:20px;overflow:hidden;position:relative;flex:0 0 26px}
  .ico-lottie > div{position:absolute;width:93.96px;height:40.68px;left:-12.56px;top:-11.13px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Reply — your AE animation, wired to the O2 button</h1>
  <p class="sub">Top: your raw comp looping, to confirm it's your animation. Bottom: the same Lottie cropped into the button's icon slot, playing once on hover.</p>

  <div class="card">
    <div class="lbl">Your comp, looping</div>
    <div class="row"><div id="bigPreview"></div></div>
  </div>

  <div class="card">
    <div class="lbl">O2 Reply button — hover to play</div>
    <div class="row">
      <button class="o2-btn" id="replyBtn" type="button">
        <span class="ico-lottie"><div id="btnLottie"></div></span>
        <span>Reply</span><span class="o2-count">1</span>
      </button>
    </div>
  </div>
</div>
