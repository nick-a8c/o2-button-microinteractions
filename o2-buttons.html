<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>O2 Flair Buttons</title>
<style>
  :root {
    --o2-border:#DCDCDE; --o2-link:#0675c4;
    --o2-font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin:0; padding:48px 36px; font-family:var(--o2-font); color:#3C434A;
         background:#f0f0f1; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:900px; margin:0 auto; zoom:0.6; }  /* 0.5 x 1.2 — crisp (not transform:scale) */
  .hint { font-size:13px; line-height:1.55; color:#6b7177; margin-bottom:24px; }

  .canvas { background:#fff; border:1px solid var(--o2-border); border-radius:8px; padding:28px; }
  .flair-row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }

  /* each button IS the supplied SVG (box + text); the icon area gets a live lottie overlay */
  .exact-btn { position:relative; display:block; padding:0; border:none; background:none;
    cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .exact-btn > svg { display:block; }
  .exact-btn .box { transition:fill .15s ease; }
  .exact-btn:hover .box { fill:#f6f7f7; }

  .ico { position:absolute; pointer-events:none; }
  .ico svg { width:100%; height:100%; display:block; overflow:visible; }

  /* avatars + "9 likes", scaled to the 64px (2x) row */
  .o2-likers { display:inline-flex; align-items:center; margin-left:4px; }
  .o2-likers .av { width:36px; height:36px; border-radius:50%; border:2px solid #fff;
    margin-left:-10px; background-size:cover; box-shadow:0 0 0 1px rgba(0,0,0,.04); }
  .o2-likers .av:first-child { margin-left:0; }
  .o2-likes-text { margin-left:8px; font-size:18px; color:var(--o2-link); cursor:pointer; }
  .o2-likes-text:hover { text-decoration:underline; }
</style>
</head>

/* Like: recolor the hover-morph layers to blue (AE source keeps them dark until frame 120). */
(function recolorHover(){
  const BLUE=[0.019607843831,0.529411792755,0.866666674614,1], names=['heart 4','star 5','star 2'];
  function set(items){ items.forEach(it=>{ if(it.ty==='st') it.c={a:0,k:BLUE,ix:it.c.ix}; if(it.it) set(it.it); }); }
  STARHEART_ANIM.layers.forEach(L=>{ if(names.includes(L.nm)&&L.shapes) set(L.shapes); });
})();

const LIKE_SEG = { hover:[0,124], hoverOff:[296,302] };
const $ = s => document.querySelector(s);
const anims = {};
const REPLY_VIEWBOX = '36.5 40.25 69.1 36.9';  // window over the arrow, from the AE mask rect

/* REPLY - play-once-on-hover, cropped to the arrow via the SVG viewBox */
let replyBusy=false;
function loadReply(){
  const slot=$('#ico-reply'); slot.innerHTML='';
  const a=lottie.loadAnimation({container:slot,renderer:'svg',loop:false,autoplay:false,animationData:REPLY_ANIM});
  a.addEventListener('DOMLoaded',()=>{ const svg=slot.querySelector('svg'); if(svg){ svg.setAttribute('viewBox',REPLY_VIEWBOX); svg.setAttribute('preserveAspectRatio','xMidYMid meet'); } a.goToAndStop(0,true); });
  a.addEventListener('complete',()=>{ replyBusy=false; });
  anims.reply=a;
}
$('#btn-reply').addEventListener('mouseenter',()=>{ if(anims.reply&&!replyBusy){ replyBusy=true; anims.reply.goToAndPlay(0,true);} });

/* FOLLOW - play-once-on-hover; viewBox-cropped & centered onto the button's icon spot */
const FOLLOW_VIEWBOX = '130.63 110.686 44 44';   // 44px window around the icon at comp (152.63,132.686)
let followBusy=false;
function loadFollow(){
  const slot=$('#ico-follow'); slot.innerHTML='';
  const a=lottie.loadAnimation({container:slot,renderer:'svg',loop:false,autoplay:false,animationData:FOLLOW3_ANIM});
  a.addEventListener('DOMLoaded',()=>{ const svg=slot.querySelector('svg'); if(svg){ svg.setAttribute('viewBox',FOLLOW_VIEWBOX); svg.setAttribute('preserveAspectRatio','xMidYMid meet'); } a.goToAndStop(0,true); });
  a.addEventListener('complete',()=>{ followBusy=false; });
  anims.follow=a;
}
$('#btn-follow').addEventListener('mouseenter',()=>{ if(anims.follow&&!followBusy){ followBusy=true; anims.follow.goToAndPlay(0,true);} });

/* LIKE - hover only: star -> heart -> star morph on hover, revert on leave */
const LIKE_IDLE=302;          // dark outline star
let likeHold=LIKE_IDLE;
function loadLike(){
  const slot=$('#ico-like'); slot.innerHTML='';
  const a=lottie.loadAnimation({container:slot,renderer:'svg',loop:false,autoplay:false,animationData:STARHEART_ANIM});
  a.addEventListener('DOMLoaded',()=>a.goToAndStop(LIKE_IDLE,true));
  a.addEventListener('complete',()=>a.goToAndStop(likeHold,true));
  anims.like=a;
}
function likePlay(seg,hold){ likeHold=hold; anims.like.playSegments(seg,true); }
$('#btn-like').addEventListener('mouseenter',()=>likePlay(LIKE_SEG.hover, 124));      // morph in
$('#btn-like').addEventListener('mouseleave',()=>likePlay(LIKE_SEG.hoverOff, LIKE_IDLE)); // revert

loadReply();
loadFollow();
loadLike();
</script>
